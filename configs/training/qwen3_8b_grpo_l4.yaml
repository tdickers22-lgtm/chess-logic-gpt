model:
  # 24GB L4 (Lightning free tier): keep the base 4-bit and CONTINUE the enriched
  # SFT adapter directly (no bf16 merge), so it fits. Small probe.
  base_model: Qwen/Qwen3-8B
  sft_adapter: Tobiasd2/chess-logic-gpt-8b-sft-enriched
  load_in_4bit: true
  trust_remote_code: true
  push_to_hub: false
  hub_model_id: null

data:
  train_file: data/processed/train_mix.jsonl

grpo:
  output_dir: data/outputs/qwen3-8b-grpo-l4
  learning_rate: 1.0e-6
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  num_generations: 2          # global batch (2x4=8) divisible by num_generations
  max_prompt_length: 1024
  max_completion_length: 256
  num_train_epochs: 1
  max_steps: 40               # PROBE, sized for the slower/smaller L4
  beta: 0.04
  temperature: 1.0
  logging_steps: 1
  save_steps: 20
  save_total_limit: 1
  bf16: true
  gradient_checkpointing: true

lora:                          # ignored in 4-bit/continue-adapter mode (kept for the merge path)
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
