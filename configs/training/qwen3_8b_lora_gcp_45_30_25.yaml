model:
  base_model: Qwen/Qwen3-8B
  trust_remote_code: true
  load_in_4bit: true
  bnb_4bit_compute_dtype: auto
  enable_thinking: false
  push_to_hub: false
  hub_model_id: null

data:
  train_file: data/processed/train_mix_45_30_25.jsonl
  eval_file: data/processed/eval_mix_45_30_25.jsonl
  text_field: text
  max_seq_length: 1024

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: data/outputs/qwen3-8b-chess-logic-lora-45-30-25
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.00008
  warmup_steps: 150
  weight_decay: 0.01
  logging_steps: 10
  eval_steps: 200
  save_steps: 25
  save_total_limit: 8
  bf16: auto
  fp16: auto
  gradient_checkpointing: true
  resume_from_checkpoint: true
  report_to: none
